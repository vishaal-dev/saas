name: Casio Stock Monitor

on:
  workflow_dispatch:
    inputs:
      product_urls:
        description: Comma-separated Casio product page URLs
        type: string
        required: false
        default: "https://casiostore.bhawar.com/products/casio-youth-ae-1200whl-5avdf-watch,https://casiostore.bhawar.com/products/casio-ae-1200whd-1avdf-black-digital-unisex-watch,https://casiostore.bhawar.com/products/casio-ae-1200wh-1avdf-black-digital-unisex-watch"
  workflow_call:
    inputs:
      product_urls:
        description: Comma-separated Casio product page URLs
        type: string
        required: false
        default: "https://casiostore.bhawar.com/products/casio-youth-ae-1200whl-5avdf-watch,https://casiostore.bhawar.com/products/casio-ae-1200whd-1avdf-black-digital-unisex-watch,https://casiostore.bhawar.com/products/casio-ae-1200wh-1avdf-black-digital-unisex-watch"

concurrency:
  group: casio-stock-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PRODUCT_URLS: ${{ inputs.product_urls }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run stock watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_FILE_PATH: ".github/state/casio_stock_state.json"
        run: |
          mkdir -p .github/state
          python3 scripts/watch_casio_stock.py

      - name: Persist monitor state
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git add .github/state/casio_stock_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update casio stock monitor state"
          # Another run may push first. Retry with rebase.
          for attempt in 1 2 3; do
            echo "Sync/push attempt $attempt..."
            git fetch origin "$BRANCH"
            if ! git rebase "origin/$BRANCH"; then
              echo "Rebase conflict while syncing state. Skipping this run."
              git rebase --abort || true
              exit 0
            fi
            if git push origin "HEAD:$BRANCH"; then
              echo "State push successful."
              exit 0
            fi
            echo "Push rejected, retrying..."
          done
          echo "Could not push state after retries. Skipping without failure."
          exit 0
