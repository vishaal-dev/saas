name: Casio Stock Scheduler

on:
  schedule:
    # GitHub Actions supports 5-minute minimum intervals.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-monitor:
    uses: ./.github/workflows/casio-stock-monitor.yml
    secrets: inherit
    # Same product list as Casio Stock Monitor (AE-1200 variants on Bhawar).
    with:
      product_urls: "https://casiostore.bhawar.com/products/casio-youth-ae-1200whl-5avdf-watch,https://casiostore.bhawar.com/products/casio-ae-1200whd-1avdf-black-digital-unisex-watch,https://casiostore.bhawar.com/products/casio-ae-1200wh-1avdf-black-digital-unisex-watch"
